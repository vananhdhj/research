name: CI Process

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate env (fail-fast)
        run: |
          [ -n "$VITE_SUPABASE_URL" ] || (echo "Missing SUPABASE_URL" && exit 1)
          [ -n "$VITE_SUPABASE_ANON_KEY" ] || (echo "Missing SUPABASE_ANON_KEY" && exit 1)

      - name: Lint
        run: npm run lint

      - name: Unit test
        run: npm run test

      - name: Build app
        run: npm run build

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure .env not included
        run: |
          if [ -f ".env" ]; then
            echo ".env file should not be committed!"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (FIXED)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true   # 🔥 FIX QUAN TRỌNG
          tags: todo-app:latest
          no-cache: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify image exists
        run: docker images

      - name: Run container (smoke test)
        run: |
          docker run -d -p 8080:80 --name test-container \
            -e VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            -e VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            todo-app:latest
          sleep 10
          curl -f http://localhost:8080 || (echo "App failed to respond" && exit 1)

      - name: Show logs if failed
        if: failure()
        run: docker logs test-container

      - name: Cleanup container
        if: always()
        run: docker rm -f test-container || true
